name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Set SITE in GitHub repo variables (Settings → Variables → Actions)
          # Example: https://yourname.github.io
          SITE: ${{ vars.SITE || '' }}
          # Defaults to /repo-name — override via repo variable if using custom domain (set to /)
          BASE: ${{ vars.BASE || format('/{0}', github.event.repository.name) }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
